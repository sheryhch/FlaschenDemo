name: Owner Codex ChatGPT Command

on:
  issue_comment:
    types:
      - created

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  ask-chatgpt:
    name: Ask ChatGPT from @codex comment
    runs-on: ubuntu-latest
    if: github.event.comment.user.login == 'sheryhch'

    steps:
      - name: Parse @codex command
        id: command
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.comment.body || '';
            const lowerBody = body.toLowerCase();
            const hasCodexMention = lowerBody.includes('@codex');

            if (!hasCodexMention) {
              core.info('No @codex command found. Skipping.');
              core.setOutput('should_run', 'false');
              return;
            }

            const prompt = body.replace(/@codex/ig, '').trim();

            core.setOutput('should_run', 'true');
            core.setOutput('prompt', prompt || 'Review this thread and suggest how to solve it.');
            core.setOutput('is_pr', context.payload.issue.pull_request ? 'true' : 'false');

      - name: Read issue or PR context
        id: context
        if: steps.command.outputs.should_run == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;
            const isPr = context.payload.issue.pull_request ? true : false;

            let threadContext = `Repository: ${owner}/${repo}\n`;
            threadContext += `${isPr ? 'Pull request' : 'Issue'} #${issue_number}\n`;
            threadContext += `Title: ${context.payload.issue.title}\n\n`;
            threadContext += `Body:\n${context.payload.issue.body || '(no body)'}\n\n`;

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 20
            });

            threadContext += 'Recent comments:\n';
            for (const comment of comments) {
              threadContext += `\n[${comment.user.login}]\n${comment.body}\n`;
            }

            if (isPr) {
              const { data: files } = await github.rest.pulls.listFiles({
                owner,
                repo,
                pull_number: issue_number,
                per_page: 20
              });

              threadContext += '\nChanged files:\n';
              for (const file of files) {
                threadContext += `\nFile: ${file.filename}\nStatus: ${file.status}\nPatch:\n${file.patch || '(patch unavailable)'}\n`;
              }
            }

            core.setOutput('thread_context', threadContext.slice(0, 60000));

      - name: Ask OpenAI
        id: openai
        if: steps.command.outputs.should_run == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          USER_PROMPT: ${{ steps.command.outputs.prompt }}
          THREAD_CONTEXT: ${{ steps.context.outputs.thread_context }}
        shell: bash
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY repository secret is missing." >&2
            exit 1
          fi

          python - <<'PY'
          import json
          import os
          import urllib.request

          api_key = os.environ['OPENAI_API_KEY']
          user_prompt = os.environ.get('USER_PROMPT', '')
          thread_context = os.environ.get('THREAD_CONTEXT', '')

          payload = {
              "model": "gpt-4.1-mini",
              "input": [
                  {
                      "role": "system",
                      "content": "You are a helpful GitHub coding assistant. Review the issue or pull request context and answer with concise, actionable guidance. If code changes are needed, describe the exact files and changes. Do not claim you pushed commits."
                  },
                  {
                      "role": "user",
                      "content": f"Owner command: {user_prompt}\n\nGitHub context:\n{thread_context}"
                  }
              ]
          }

          request = urllib.request.Request(
              'https://api.openai.com/v1/responses',
              data=json.dumps(payload).encode('utf-8'),
              headers={
                  'Content-Type': 'application/json',
                  'Authorization': f'Bearer {api_key}'
              },
              method='POST'
          )

          with urllib.request.urlopen(request, timeout=60) as response:
              data = json.loads(response.read().decode('utf-8'))

          text_parts = []
          for item in data.get('output', []):
              for content in item.get('content', []):
                  if content.get('type') == 'output_text':
                      text_parts.append(content.get('text', ''))

          answer = '\n'.join(text_parts).strip() or 'No response text returned by OpenAI.'

          with open('openai_answer.md', 'w', encoding='utf-8') as f:
              f.write(answer)
          PY

      - name: Comment ChatGPT answer
        if: steps.command.outputs.should_run == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const answer = fs.readFileSync('openai_answer.md', 'utf8');
            const body = `@codex response from ChatGPT:\n\n${answer}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body.slice(0, 65000)
            });
