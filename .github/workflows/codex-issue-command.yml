name: Owner Codexbot Issue Command

on:
  issue_comment:
    types:
      - created

permissions:
  contents: read
  issues: write

jobs:
  handle-codexbot-command:
    name: Handle @codexbot issue command
    runs-on: ubuntu-latest
    if: >
      github.event.comment.user.login == 'sheryhch' &&
      !github.event.issue.pull_request

    steps:
      - name: Close issue when owner asks Codexbot to solve it
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;
            const body = context.payload.comment.body.toLowerCase();

            const hasCodexbotMention = body.includes('@codexbot');
            const hasSolveCommand = body.includes('solve this issue') || body.includes('solve issue') || body.includes('solve this') || body.includes('/solve');

            if (!hasCodexbotMention || !hasSolveCommand) {
              core.info('No supported @codexbot solve command found. Skipping.');
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: 'Owner command received: `@codexbot solve this issue`. Closing this issue as completed.'
            });

            await github.rest.issues.update({
              owner,
              repo,
              issue_number,
              state: 'closed',
              state_reason: 'completed'
            });
