name: PR Checks

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
      - openaitestB
      - branchc1

permissions:
  contents: read
  pull-requests: read

jobs:
  dotnet-checks:
    name: .NET restore, build, format, and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      - name: Restore
        run: dotnet restore FlaschenDemo.sln /p:CheckEolTargetFramework=false

      - name: Build
        run: dotnet build FlaschenDemo.sln --configuration Release --no-restore /p:CheckEolTargetFramework=false

      - name: Verify formatting
        run: dotnet format FlaschenDemo.sln --verify-no-changes --verbosity diagnostic

      - name: Test
        run: dotnet test FlaschenDemo.sln --configuration Release --no-build --verbosity normal /p:CheckEolTargetFramework=false
